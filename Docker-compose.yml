services:
  db:
    container_name: postgres_jobs
    image: postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      PGDATA: /data/postgres
    volumes:
      - db:/data/postgres
    ports:
      - "5333:5432"
    restart: unless-stopped

networks:
  db:
    driver: bridge

volumes:
  db: